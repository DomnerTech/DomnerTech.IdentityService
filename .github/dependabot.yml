# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "/DomnerTech.IdentityService.API" # Location of package manifests
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 50
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "/DomnerTech.IdentityService.Domain" # Location of package manifests
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 50
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "/DomnerTech.IdentityService.Application" # Location of package manifests
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 50
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "/DomnerTech.IdentityService.Infrastructure" # Location of package manifests
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 50
  - package-ecosystem: "nuget" # See documentation for possible values
    directory: "/DomnerTech.IdentityService.WorkerService" # Location of package manifests
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 50
